<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uzi Leaks - Offline</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --border: #ffffff;
            --accent: #ff0055;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: left;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        /* Setup Button */
        .setup-section {
            margin-bottom: 20px;
        }

        .btn-large {
            width: 100%;
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 15px;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .search-container {
            margin-bottom: 20px;
        }

        #search-input {
            width: 100%;
            background: transparent;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            font-size: 14px;
            outline: none;
        }

        .player-section {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 10;
        }

        .now-playing-name {
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 10px;
        }

        .timeline-container {
            width: 100%;
            margin-bottom: 20px;
        }

        #progress-bar {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: #333;
            outline: none;
        }

        #progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--text);
            cursor: pointer;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-family: monospace;
            margin-top: 5px;
            opacity: 0.6;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
        }

        button:active {
            background: var(--text);
            color: var(--bg);
        }

        .track-item {
            padding: 18px 10px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            font-size: 14px;
        }

        .track-item.active {
            background-color: #ffffff;
            color: #000000;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>UZI LEAKS</h1>
            <p style="font-size: 11px; letter-spacing: 2px; opacity: 0.5;">OFFLINE ARCHIVE v3.0</p>
        </div>

        <div class="setup-section" id="setup-area">
            <button class="btn-large" onclick="selectFolder()">OPEN LOCAL FOLDER</button>
            <p style="font-size: 10px; margin-top: 10px; text-align: center; opacity: 0.5;">Select the folder containing your .mp3 files</p>
        </div>

        <div id="main-content" class="hidden">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="SEARCH LOCAL..." oninput="filterTracks()">
            </div>

            <div class="player-section">
                <div class="now-playing-name" id="current-track">READY</div>
                
                <div class="timeline-container">
                    <input type="range" id="progress-bar" value="0" min="0" step="1">
                    <div class="time-info">
                        <span id="current-time">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <audio id="audio-player" playsinline></audio>
                
                <div class="controls">
                    <button onclick="previousTrack()">BACK</button>
                    <button id="play-btn" onclick="togglePlay()">PLAY</button>
                    <button onclick="nextTrack()">NEXT</button>
                </div>
            </div>

            <div id="playlist" class="playlist"></div>
        </div>
    </div>

    <input type="file" id="directory-picker" webkitdirectory directory class="hidden">

    <script>
        let tracks = [];
        let filteredTracks = [];
        let currentTrackIndex = 0;
        
        const audioPlayer = document.getElementById('audio-player');
        const playlistContainer = document.getElementById('playlist');
        const currentTrackDisplay = document.getElementById('current-track');
        const playBtn = document.getElementById('play-btn');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeDisplay = document.getElementById('current-time');
        const durationDisplay = document.getElementById('duration');
        const searchInput = document.getElementById('search-input');

        // Function to select and read the folder
        async function selectFolder() {
            const picker = document.getElementById('directory-picker');
            
            // Standard directory picker trigger
            picker.click();

            picker.onchange = async (e) => {
                const files = Array.from(e.target.files);
                
                tracks = files
                    .filter(file => file.name.toLowerCase().endsWith('.mp3'))
                    .sort((a, b) => a.name.localeCompare(b.name))
                    .map(file => ({
                        name: file.name.replace('.mp3', ''),
                        url: URL.createObjectURL(file) // Creates a local temporary URL
                    }));

                if (tracks.length > 0) {
                    document.getElementById('setup-area').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                    filteredTracks = [...tracks];
                    renderPlaylist(filteredTracks);
                    loadTrack(0, false);
                    setupMediaSession();
                } else {
                    alert("No .mp3 files found in this folder.");
                }
            };
        }

        function renderPlaylist(list) {
            playlistContainer.innerHTML = '';
            list.forEach((track) => {
                const trackElement = document.createElement('div');
                trackElement.className = `track-item ${track.url === tracks[currentTrackIndex]?.url ? 'active' : ''}`;
                trackElement.textContent = track.name;
                trackElement.onclick = () => playFromList(track.url);
                playlistContainer.appendChild(trackElement);
            });
        }

        function filterTracks() {
            const query = searchInput.value.toLowerCase();
            filteredTracks = tracks.filter(t => t.name.toLowerCase().includes(query));
            renderPlaylist(filteredTracks);
        }

        function playFromList(url) {
            const index = tracks.findIndex(t => t.url === url);
            loadTrack(index, true);
        }

        function loadTrack(index, autoPlay) {
            currentTrackIndex = index;
            const track = tracks[index];
            audioPlayer.src = track.url;
            currentTrackDisplay.textContent = track.name;
            document.title = track.name;
            
            // Update active states
            renderPlaylist(filteredTracks);

            if (autoPlay) audioPlayer.play();
        }

        function togglePlay() {
            if (audioPlayer.paused) audioPlayer.play();
            else audioPlayer.pause();
        }

        function nextTrack() {
            loadTrack((currentTrackIndex + 1) % tracks.length, true);
        }

        function previousTrack() {
            loadTrack((currentTrackIndex - 1 + tracks.length) % tracks.length, true);
        }

        // Timeline Logic
        audioPlayer.ontimeupdate = () => {
            if (!isNaN(audioPlayer.duration)) {
                const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressBar.value = progress;
                currentTimeDisplay.textContent = formatTime(audioPlayer.currentTime);
                durationDisplay.textContent = formatTime(audioPlayer.duration);
            }
        };

        progressBar.oninput = () => {
            const time = (progressBar.value / 100) * audioPlayer.duration;
            audioPlayer.currentTime = time;
        };

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', () => audioPlayer.play());
                navigator.mediaSession.setActionHandler('pause', () => audioPlayer.pause());
                navigator.mediaSession.setActionHandler('previoustrack', () => previousTrack());
                navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack());
            }
        }

        audioPlayer.addEventListener('play', () => playBtn.textContent = 'PAUSE');
        audioPlayer.addEventListener('pause', () => playBtn.textContent = 'PLAY');
        audioPlayer.addEventListener('ended', nextTrack);
    </script>
</body>
</html>
