<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uzi Leaks</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --border: #ffffff;
            --accent: #ff0055; /* Subtle accent for progress */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: left;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 20px;
        }

        #search-input {
            width: 100%;
            background: transparent;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }

        #search-input:focus {
            border-color: var(--border);
        }

        .player-section {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 10;
        }

        .now-playing-name {
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 10px;
        }

        /* Custom Timeline */
        .timeline-container {
            width: 100%;
            margin-bottom: 20px;
        }

        #progress-bar {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: #333;
            outline: none;
            cursor: pointer;
        }

        #progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--text);
            cursor: pointer;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-family: monospace;
            margin-top: 5px;
            opacity: 0.6;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 0;
        }

        button:active {
            background: var(--text);
            color: var(--bg);
        }

        .track-item {
            padding: 18px 10px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .track-item.active {
            background-color: #ffffff;
            color: #000000;
        }

        .track-name {
            font-size: 14px;
            flex: 1;
            padding-right: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Download Icon */
        .dl-link {
            color: inherit;
            text-decoration: none;
            padding: 5px 10px;
            font-size: 18px;
            opacity: 0.6;
        }

        .dl-link:hover {
            opacity: 1;
        }

        .loading {
            padding: 40px;
            text-align: center;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>UZI LEAKS</h1>
            <p style="font-size: 11px; letter-spacing: 2px; opacity: 0.5;">DARK ARCHIVE v2.2</p>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="SEARCH ARCHIVE..." oninput="filterTracks()">
        </div>

        <div class="player-section">
            <div class="now-playing-name" id="current-track">SELECT TRACK</div>
            
            <div class="timeline-container">
                <input type="range" id="progress-bar" value="0" min="0" step="1">
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <audio id="audio-player" playsinline></audio>
            
            <div class="controls">
                <button onclick="previousTrack()">BACK</button>
                <button id="play-btn" onclick="togglePlay()">PLAY</button>
                <button onclick="nextTrack()">NEXT</button>
            </div>
        </div>

        <div class="playlist-section">
            <div id="playlist" class="playlist"></div>
        </div>
    </div>

    <script>
        const REPO_OWNER = 'ph4xus';
        const REPO_NAME = 'UziLeaks';
        const GITHUB_API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;

        let tracks = [];
        let filteredTracks = [];
        let currentTrackIndex = 0;
        
        const audioPlayer = document.getElementById('audio-player');
        const playlistContainer = document.getElementById('playlist');
        const currentTrackDisplay = document.getElementById('current-track');
        const playBtn = document.getElementById('play-btn');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeDisplay = document.getElementById('current-time');
        const durationDisplay = document.getElementById('duration');
        const searchInput = document.getElementById('search-input');

        async function loadTracks() {
            try {
                playlistContainer.innerHTML = '<div class="loading">SYNCING ARCHIVE...</div>';
                const response = await fetch(GITHUB_API);
                const contents = await response.json();
                
                tracks = contents
                    .filter(item => item.type === 'file' && item.name.toLowerCase().endsWith('.mp3'))
                    .sort((a, b) => a.name.localeCompare(b.name))
                    .map(item => ({
                        name: item.name.replace('.mp3', ''),
                        url: item.download_url
                    }));

                filteredTracks = [...tracks];
                if (tracks.length > 0) {
                    renderPlaylist(filteredTracks);
                    loadTrack(0, false);
                    setupMediaSession();
                }
            } catch (e) {
                playlistContainer.innerHTML = '<div class="loading">CONNECTION ERROR.</div>';
            }
        }

        function renderPlaylist(list) {
            playlistContainer.innerHTML = '';
            list.forEach((track, index) => {
                const trackElement = document.createElement('div');
                trackElement.className = `track-item ${track.url === tracks[currentTrackIndex]?.url ? 'active' : ''}`;
                trackElement.innerHTML = `
                    <div class="track-name" onclick="playFromList('${track.url}')">${track.name}</div>
                    <a href="${track.url}" download="${track.name}.mp3" class="dl-link" onclick="event.stopPropagation()">↓</a>
                `;
                playlistContainer.appendChild(trackElement);
            });
        }

        function filterTracks() {
            const query = searchInput.value.toLowerCase();
            filteredTracks = tracks.filter(t => t.name.toLowerCase().includes(query));
            renderPlaylist(filteredTracks);
        }

        function playFromList(url) {
            const index = tracks.findIndex(t => t.url === url);
            loadTrack(index, true);
        }

        function loadTrack(index, autoPlay) {
            currentTrackIndex = index;
            const track = tracks[index];
            audioPlayer.src = track.url;
            currentTrackDisplay.textContent = track.name;
            document.title = track.name;
            
            document.querySelectorAll('.track-item').forEach(item => item.classList.remove('active'));
            renderPlaylist(filteredTracks);

            if (autoPlay) audioPlayer.play();
        }

        function togglePlay() {
            if (audioPlayer.paused) audioPlayer.play();
            else audioPlayer.pause();
        }

        function nextTrack() {
            loadTrack((currentTrackIndex + 1) % tracks.length, true);
        }

        function previousTrack() {
            loadTrack((currentTrackIndex - 1 + tracks.length) % tracks.length, true);
        }

        // Timeline Logic
        audioPlayer.ontimeupdate = () => {
            if (!isNaN(audioPlayer.duration)) {
                const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressBar.value = progress;
                currentTimeDisplay.textContent = formatTime(audioPlayer.currentTime);
                durationDisplay.textContent = formatTime(audioPlayer.duration);
            }
        };

        progressBar.oninput = () => {
            const time = (progressBar.value / 100) * audioPlayer.duration;
            audioPlayer.currentTime = time;
        };

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', () => audioPlayer.play());
                navigator.mediaSession.setActionHandler('pause', () => audioPlayer.pause());
                navigator.mediaSession.setActionHandler('previoustrack', () => previousTrack());
                navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack());
            }
        }

        audioPlayer.addEventListener('play', () => playBtn.textContent = 'PAUSE');
        audioPlayer.addEventListener('pause', () => playBtn.textContent = 'PLAY');
        audioPlayer.addEventListener('ended', nextTrack);

        window.addEventListener('load', loadTracks);
    </script>
</body>
</html>
