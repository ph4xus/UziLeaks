<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzi Leaks Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 5px;
            font-size: 28px;
        }

        .header p {
            color: #888;
            font-size: 14px;
        }

        .player-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            color: white;
        }

        .now-playing {
            margin-bottom: 20px;
            text-align: center;
        }

        .now-playing-title {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .now-playing-name {
            font-size: 22px;
            font-weight: bold;
            word-break: break-word;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        audio {
            width: 100%;
            margin-bottom: 20px;
            height: 40px;
            border-radius: 8px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            opacity: 0.8;
            margin-top: 10px;
        }

        .playlist-section {
            margin-top: 25px;
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .playlist-header h2 {
            color: #333;
            font-size: 18px;
        }

        .track-count {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .playlist {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background: #f9f9f9;
        }

        .track-item {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #333;
        }

        .track-item:last-child {
            border-bottom: none;
        }

        .track-item:hover {
            background: #f0f0f0;
            padding-left: 20px;
        }

        .track-item.active {
            background: #667eea;
            color: white;
            font-weight: 600;
        }

        .track-number {
            min-width: 30px;
            text-align: center;
            font-size: 12px;
            opacity: 0.6;
        }

        .track-name {
            flex: 1;
            word-break: break-word;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .playlist::-webkit-scrollbar {
            width: 6px;
        }

        .playlist::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .playlist::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .playlist::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .now-playing-name {
                font-size: 18px;
            }

            .controls {
                gap: 8px;
            }

            button {
                padding: 8px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 Uzi Leaks</h1>
            <p>Auto-loading Music Player</p>
        </div>

        <div id="error-container"></div>

        <div class="player-section">
            <div class="now-playing">
                <div class="now-playing-title">Now Playing</div>
                <div class="now-playing-name" id="current-track">Select a track</div>
            </div>

            <audio id="audio-player" controls>
                Your browser does not support the audio element.
            </audio>

            <div class="controls">
                <button id="prev-btn" onclick="previousTrack()">⏮️ Previous</button>
                <button id="play-btn" onclick="togglePlay()">▶️ Play</button>
                <button id="next-btn" onclick="nextTrack()">Next ⏭️</button>
            </div>

            <div class="progress-info">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="playlist-section">
            <div class="playlist-header">
                <h2>Playlist</h2>
                <div class="track-count" id="track-count">0 tracks</div>
            </div>
            <div class="playlist" id="playlist"></div>
        </div>
    </div>

    <script>
        const REPO_OWNER = 'ph4xus';
        const REPO_NAME = 'UziLeaks';
        const GITHUB_API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;

        let tracks = [];
        let currentTrackIndex = 0;
        const audioPlayer = document.getElementById('audio-player');
        const playlistContainer = document.getElementById('playlist');
        const currentTrackDisplay = document.getElementById('current-track');
        const trackCountDisplay = document.getElementById('track-count');
        const errorContainer = document.getElementById('error-container');

        // Format time helper
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Load tracks from GitHub API
        async function loadTracks() {
            try {
                playlistContainer.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading tracks...</p></div>';
                
                const response = await fetch(GITHUB_API);
                if (!response.ok) throw new Error('Failed to fetch repository contents');
                
                const contents = await response.json();
                
                // Filter only MP3 files and sort alphabetically
                tracks = contents
                    .filter(item => item.type === 'file' && item.name.toLowerCase().endsWith('.mp3'))
                    .sort((a, b) => a.name.localeCompare(b.name))
                    .map(item => ({
                        name: item.name.replace('.mp3', ''),
                        url: item.download_url,
                        fullName: item.name
                    }));

                if (tracks.length === 0) {
                    showError('No MP3 files found in the repository');
                    playlistContainer.innerHTML = '<div class="loading">No tracks available</div>';
                    return;
                }

                renderPlaylist();
                loadTrack(0);
            } catch (error) {
                showError(`Error loading tracks: ${error.message}`);
                console.error('Error:', error);
            }
        }

        // Render playlist
        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            trackCountDisplay.textContent = `${tracks.length} track${tracks.length !== 1 ? 's' : ''}`;

            tracks.forEach((track, index) => {
                const trackElement = document.createElement('div');
                trackElement.className = `track-item ${index === currentTrackIndex ? 'active' : ''}`;
                trackElement.innerHTML = `
                    <div class="track-number">${index + 1}</div>
                    <div class="track-name">${track.name}</div>
                `;
                trackElement.onclick = () => loadTrack(index);
                playlistContainer.appendChild(trackElement);
            });
        }

        // Load a track
        function loadTrack(index) {
            if (index < 0 || index >= tracks.length) return;
            
            currentTrackIndex = index;
            const track = tracks[index];
            
            audioPlayer.src = track.url;
            currentTrackDisplay.textContent = track.name;
            
            // Update active state in playlist
            document.querySelectorAll('.track-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });

            // Auto-scroll to active track
            const activeTrack = document.querySelectorAll('.track-item')[index];
            if (activeTrack) {
                activeTrack.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // Playback controls
        function togglePlay() {
            if (audioPlayer.paused) {
                audioPlayer.play();
                document.getElementById('play-btn').textContent = '⏸️ Pause';
            } else {
                audioPlayer.pause();
                document.getElementById('play-btn').textContent = '▶️ Play';
            }
        }

        function nextTrack() {
            loadTrack((currentTrackIndex + 1) % tracks.length);
            audioPlayer.play();
            document.getElementById('play-btn').textContent = '⏸️ Pause';
        }

        function previousTrack() {
            loadTrack((currentTrackIndex - 1 + tracks.length) % tracks.length);
            audioPlayer.play();
            document.getElementById('play-btn').textContent = '⏸️ Pause';
        }

        // Update time display
        audioPlayer.addEventListener('timeupdate', () => {
            document.getElementById('current-time').textContent = formatTime(audioPlayer.currentTime);
            document.getElementById('duration').textContent = formatTime(audioPlayer.duration);
        });

        // Auto play next track
        audioPlayer.addEventListener('ended', nextTrack);

        // Update play button state
        audioPlayer.addEventListener('play', () => {
            document.getElementById('play-btn').textContent = '⏸️ Pause';
        });

        audioPlayer.addEventListener('pause', () => {
            document.getElementById('play-btn').textContent = '▶️ Play';
        });

        // Show error message
        function showError(message) {
            errorContainer.innerHTML = `<div class="error">${message}</div>`;
        }

        // Initialize on page load
        window.addEventListener('load', loadTracks);
    </script>
</body>
</html>
