
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UziLeaks Music Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .player-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }

        .player-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .player-header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .player-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .player-body {
            padding: 30px 20px;
        }

        .now-playing {
            margin-bottom: 30px;
            text-align: center;
        }

        .album-art {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .track-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .track-time {
            font-size: 12px;
            color: #999;
            margin-bottom: 15px;
        }

        .progress-container {
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .volume-container {
            margin-bottom: 20px;
        }

        .volume-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            display: block;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .playlist-container {
            max-height: 300px;
            overflow-y: auto;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
        }

        .playlist-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 15px;
        }

        .playlist-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #333;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            word-break: break-word;
        }

        .playlist-item:hover {
            background: #efefef;
            border-left-color: #667eea;
        }

        .playlist-item.active {
            background: #667eea;
            color: white;
            border-left-color: #764ba2;
        }

        audio {
            display: none;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            border-left: 3px solid #c33;
        }

        @media (max-width: 480px) {
            .player-header h1 {
                font-size: 24px;
            }
            
            .album-art {
                width: 150px;
                height: 150px;
                font-size: 60px;
            }
            
            button {
                padding: 10px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="player-header">
            <h1>🎵 UziLeaks Player</h1>
            <p>Web Browser Music Player</p>
        </div>

        <div class="player-body">
            <div id="error" class="error" style="display: none;"></div>

            <div class="now-playing">
                <div class="album-art">🎧</div>
                <div class="track-title" id="trackTitle">Select a track</div>
                <div class="track-time">
                    <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <div class="controls">
                <button id="prevBtn">⏮ Previous</button>
                <button id="playBtn">▶ Play</button>
                <button id="pauseBtn">⏸ Pause</button>
                <button id="nextBtn">Next ⏭</button>
            </div>

            <div class="volume-container">
                <label class="volume-label">Volume</label>
                <input type="range" id="volumeControl" min="0" max="100" value="70">
            </div>

            <div class="playlist-container">
                <div class="playlist-title">Playlist</div>
                <div id="playlist"></div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        // Sample playlist - you can modify these URLs
        const playlistData = [
            { title: "10's - Uzi", url: "https://raw.githubusercontent.com/ph4xus/UziLeaks/main/10%E2%80%99s%20-%20Uzi.mp3" },
            { title: "13 Nuyork Nights At 21", url: "https://raw.githubusercontent.com/ph4xus/UziLeaks/main/13_Nuyork_Nights_At_21_Produced_By_FKI_KLICKAUD.mp3" },
            { title: "All Of The Lights", url: "https://raw.githubusercontent.com/ph4xus/UziLeaks/main/All_Of_The_Lights_KLICKAUD.mp3" },
            { title: "Barriers Screamo", url: "https://raw.githubusercontent.com/ph4xus/UziLeaks/main/Barriers_Screamo_prod_Dolan_Beats_KLICKAUD.mp3" },
            { title: "Buy It", url: "https://raw.githubusercontent.com/ph4xus/UziLeaks/main/Buy_It_Produced_By_Zaytoven_KLICKAUD.mp3" },
            { title: "Confessions", url: "https://raw.githubusercontent.com/ph4xus/UziLeaks/main/Confessions%20-%20lil%20uzi_[cut_182sec].mp3" },
            { title: "Don't Save Her", url: "https://raw.githubusercontent.com/ph4xus/UziLeaks/main/Don%E2%80%99t%20Save%20Her%20-%20Uzi_[cut_219sec].mp3" },
            { title: "Dover Street", url: "https://raw.githubusercontent.com/ph4xus/UziLeaks/main/Dover%20Street%20-%20Lil%20Uzi.mp3" },
            { title: "Fallen Angel", url: "https://raw.githubusercontent.com/ph4xus/UziLeaks/main/Fallen%20Angel%20-%20Lil%20Uzi%20Vert.mp3" },
            { title: "Flexin", url: "https://raw.githubusercontent.com/ph4xus/UziLeaks/main/Flexin_Lil_Uzi_KLICKAUD.mp3" }
        ];

        let currentTrackIndex = 0;
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const volumeControl = document.getElementById('volumeControl');
        const trackTitle = document.getElementById('trackTitle');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const playlistEl = document.getElementById('playlist');
        const errorEl = document.getElementById('error');

        function showError(message) {
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function loadTrack(index) {
            if (index < 0 || index >= playlistData.length) return;
            currentTrackIndex = index;
            const track = playlistData[index];
            
            trackTitle.textContent = track.title;
            audioPlayer.src = track.url;
            
            // Update active item in playlist
            document.querySelectorAll('.playlist-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
        }

        function play() {
            audioPlayer.play().catch(err => {
                showError(`Playback error: ${err.message}`);
            });
            playBtn.style.opacity = '0.6';
            pauseBtn.style.opacity = '1';
        }

        function pause() {
            audioPlayer.pause();
            playBtn.style.opacity = '1';
            pauseBtn.style.opacity = '0.6';
        }

        function nextTrack() {
            loadTrack(currentTrackIndex + 1);
            play();
        }

        function prevTrack() {
            loadTrack(currentTrackIndex - 1);
            play();
        }

        // Event listeners
        playBtn.addEventListener('click', play);
        pauseBtn.addEventListener('click', pause);
        nextBtn.addEventListener('click', nextTrack);
        prevBtn.addEventListener('click', prevTrack);

        volumeControl.addEventListener('input', (e) => {
            audioPlayer.volume = e.target.value / 100;
        });

        audioPlayer.addEventListener('timeupdate', () => {
            const percentage = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressFill.style.width = percentage + '%';
            currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
        });

        audioPlayer.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audioPlayer.duration);
        });

        audioPlayer.addEventListener('ended', () => {
            if (currentTrackIndex < playlistData.length - 1) {
                nextTrack();
            }
        });

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        });

        // Initialize playlist
        playlistData.forEach((track, index) => {
            const item = document.createElement('div');
            item.className = 'playlist-item';
            item.textContent = track.title;
            item.addEventListener('click', () => {
                loadTrack(index);
                play();
            });
            playlistEl.appendChild(item);
        });

        // Load first track
        loadTrack(0);
        audioPlayer.volume = 0.7;
    </script>
</body>
</html>
