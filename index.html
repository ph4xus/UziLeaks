<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uzi Leaks</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --border: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: left;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .header p {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
        }

        .player-section {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 10;
        }

        .now-playing-title {
            font-size: 9px;
            text-transform: uppercase;
            margin-bottom: 4px;
            opacity: 0.6;
        }

        .now-playing-name {
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 15px;
        }

        audio {
            width: 100%;
            height: 40px;
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            -webkit-appearance: none;
            border-radius: 0;
        }

        button:active {
            background: var(--text);
            color: var(--bg);
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 5px;
        }

        .playlist-header h2 {
            font-size: 12px;
            text-transform: uppercase;
        }

        .track-count {
            font-size: 10px;
            opacity: 0.6;
        }

        .playlist {
            border-top: 1px solid var(--border);
        }

        .track-item {
            padding: 18px 10px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .track-item.active {
            background-color: #ffffff;
            color: #000000;
        }

        .track-number {
            font-size: 10px;
            margin-right: 15px;
            width: 20px;
            font-family: monospace;
        }

        .track-name {
            font-size: 14px;
            flex: 1;
        }

        .loading {
            padding: 40px;
            text-align: center;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>UZI LEAKS</h1>
            <p>DARK ARCHIVE v2.1</p>
        </div>

        <div id="error-container"></div>

        <div class="player-section">
            <div class="now-playing-title">Current File</div>
            <div class="now-playing-name" id="current-track">SELECT TRACK</div>

            <audio id="audio-player" controls playsinline>
                Your browser is not supported.
            </audio>

            <div class="controls">
                <button onclick="previousTrack()">BACK</button>
                <button id="play-btn" onclick="togglePlay()">PLAY</button>
                <button onclick="nextTrack()">NEXT</button>
            </div>
        </div>

        <div class="playlist-section">
            <div class="playlist-header">
                <h2>FILES</h2>
                <div id="track-count" class="track-count">0 ITEMS</div>
            </div>
            <div class="playlist" id="playlist"></div>
        </div>
    </div>

    <script>
        const REPO_OWNER = 'ph4xus';
        const REPO_NAME = 'UziLeaks';
        const GITHUB_API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;

        let tracks = [];
        let currentTrackIndex = 0;
        const audioPlayer = document.getElementById('audio-player');
        const playlistContainer = document.getElementById('playlist');
        const currentTrackDisplay = document.getElementById('current-track');
        const trackCountDisplay = document.getElementById('track-count');
        const playBtn = document.getElementById('play-btn');

        async function loadTracks() {
            try {
                playlistContainer.innerHTML = '<div class="loading">SYNCING ARCHIVE...</div>';
                const response = await fetch(GITHUB_API);
                const contents = await response.json();
                
                tracks = contents
                    .filter(item => item.type === 'file' && item.name.toLowerCase().endsWith('.mp3'))
                    .sort((a, b) => a.name.localeCompare(b.name))
                    .map(item => ({
                        name: item.name.replace('.mp3', ''),
                        url: item.download_url
                    }));

                if (tracks.length > 0) {
                    renderPlaylist();
                    loadTrack(0, false);
                    setupMediaSession();
                } else {
                    playlistContainer.innerHTML = '<div class="loading">NO FILES FOUND.</div>';
                }
            } catch (e) {
                playlistContainer.innerHTML = '<div class="loading">CONNECTION ERROR.</div>';
            }
        }

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            trackCountDisplay.textContent = `${tracks.length} ITEMS`;

            tracks.forEach((track, index) => {
                const trackElement = document.createElement('div');
                trackElement.className = `track-item ${index === currentTrackIndex ? 'active' : ''}`;
                trackElement.innerHTML = `
                    <div class="track-number">${(index + 1).toString().padStart(2, '0')}</div>
                    <div class="track-name">${track.name}</div>
                `;
                trackElement.onclick = () => loadTrack(index, true);
                playlistContainer.appendChild(trackElement);
            });
        }

        function loadTrack(index, autoPlay) {
            currentTrackIndex = index;
            const track = tracks[index];
            audioPlayer.src = track.url;
            currentTrackDisplay.textContent = track.name;
            // Set a new title
            document.title = track.name;
            
            // Highlight current in UI
            const items = document.querySelectorAll('.track-item');
            items.forEach((item, i) => item.classList.toggle('active', i === index));

            updateMediaMetadata(track);

            if (autoPlay) {
                audioPlayer.play().catch(() => console.log("User must interact first"));
            }
        }

        function togglePlay() {
            if (audioPlayer.paused) audioPlayer.play();
            else audioPlayer.pause();
        }

        function nextTrack() {
            loadTrack((currentTrackIndex + 1) % tracks.length, true);
        }

        function previousTrack() {
            loadTrack((currentTrackIndex - 1 + tracks.length) % tracks.length, true);
        }

        // --- iOS Lockscreen & Control Center Sync ---
        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', () => audioPlayer.play());
                navigator.mediaSession.setActionHandler('pause', () => audioPlayer.pause());
                navigator.mediaSession.setActionHandler('previoustrack', () => previousTrack());
                navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack());
            }
        }
